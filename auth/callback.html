<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Connecting Whoop...</title>
<style>
  body{margin:0;background:#000;color:#fff;font-family:-apple-system,sans-serif;display:flex;align-items:center;justify-content:center;min-height:100vh;text-align:center;padding:20px;}
  .wrap{max-width:320px;}
  .icon{font-size:48px;margin-bottom:16px;}
  h1{font-size:22px;font-weight:700;margin-bottom:8px;}
  p{font-size:15px;color:rgba(255,255,255,.6);line-height:1.5;margin-bottom:24px;}
  .btn{display:inline-block;background:#fff;color:#000;font-size:14px;font-weight:700;padding:14px 28px;border-radius:100px;text-decoration:none;cursor:pointer;border:none;}
  .error{color:#FF3B30;}
  .success{color:#34C759;}
</style>
</head>
<body>
<div class="wrap">
  <div class="icon" id="icon">⏳</div>
  <h1 id="title">Connecting Whoop...</h1>
  <p id="msg">Exchanging authorization code...</p>
  <div id="action"></div>
</div>
<script>
const params = new URLSearchParams(window.location.search)
const error = params.get('error')
const code = params.get('code')
const state = params.get('state')
const savedState = localStorage.getItem('whoop_state')

if (error) {
  document.getElementById('icon').textContent = '❌'
  document.getElementById('title').textContent = 'Connection Failed'
  document.getElementById('msg').innerHTML = '<span class="error">' + (params.get('error_description') || error) + '</span>'
  document.getElementById('action').innerHTML = '<a class="btn" href="https://mattyinc.github.io/matty-7">← Back to App</a>'
} else if (!code) {
  document.getElementById('icon').textContent = '❓'
  document.getElementById('title').textContent = 'No Code'
  document.getElementById('msg').textContent = 'No authorization code received.'
  document.getElementById('action').innerHTML = '<a class="btn" href="https://mattyinc.github.io/matty-7">← Back to App</a>'
} else {
  // State check (optional — warn but don't block)
  if (savedState && state !== savedState) {
    console.warn('State mismatch — possible CSRF')
  }
  localStorage.removeItem('whoop_state')

  // Store the auth code — Vercel will exchange it, or we do it client-side
  localStorage.setItem('whoop_auth_code', code)

  // Try Vercel token exchange first
  exchangeToken(code)
}

async function exchangeToken(code) {
  try {
    const res = await fetch('https://matty-7.vercel.app/api/whoop/callback?code=' + encodeURIComponent(code))
    if (res.ok) {
      // Vercel handled it — redirect back
      document.getElementById('icon').textContent = '✅'
      document.getElementById('title').textContent = 'Whoop Connected!'
      document.getElementById('msg').innerHTML = '<span class="success">Your recovery, sleep and workout data will now sync automatically.</span>'
      document.getElementById('action').innerHTML = '<a class="btn" href="https://mattyinc.github.io/matty-7">Open Matty 7.0 →</a>'
      localStorage.setItem('whoop_connected', '1')
      setTimeout(() => { window.location.href = 'https://mattyinc.github.io/matty-7' }, 2000)
      return
    }
  } catch(e) {
    console.log('Vercel not available, using direct exchange')
  }

  // Vercel not set up yet — do client-side token exchange via CORS proxy
  // Store code and redirect, app will handle it
  localStorage.setItem('whoop_auth_code', code)
  document.getElementById('icon').textContent = '✅'
  document.getElementById('title').textContent = 'Almost there!'
  document.getElementById('msg').textContent = 'Authorization received. Tap below to complete setup.'
  document.getElementById('action').innerHTML = '<a class="btn" href="https://mattyinc.github.io/matty-7#whoop_code=' + encodeURIComponent(code) + '">Complete Setup →</a>'
}
</script>
</body>
</html>
