<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Connecting Whoop...</title>
<style>
body{margin:0;background:#000;color:#fff;font-family:-apple-system,sans-serif;display:flex;align-items:center;justify-content:center;min-height:100vh;text-align:center;padding:20px;}
.wrap{max-width:340px;}
.icon{font-size:56px;margin-bottom:16px;}
h1{font-size:22px;font-weight:700;margin-bottom:10px;}
p{font-size:15px;color:rgba(255,255,255,.6);line-height:1.6;margin-bottom:24px;}
.btn{display:inline-block;background:#fff;color:#000;font-size:14px;font-weight:700;padding:14px 32px;border-radius:100px;text-decoration:none;border:none;cursor:pointer;}
.success{color:#34C759;}
.error{color:#FF3B30;}
</style>
</head>
<body>
<div class="wrap">
  <div class="icon" id="icon">⏳</div>
  <h1 id="title">Connecting Whoop...</h1>
  <p id="msg">Exchanging authorization code...</p>
  <div id="action"></div>
</div>
<script>
const API_BASE = 'https://matty-7.vercel.app'
const REDIRECT_URI = 'https://mattyinc.github.io/matty-7/auth/callback.html'
const APP_URL = 'https://mattyinc.github.io/matty-7'

const params = new URLSearchParams(window.location.search)
const error = params.get('error')
const code = params.get('code')
const returnedState = params.get('state')
const expectedState = localStorage.getItem('whoop_state')

function setUI(icon, title, message, tone, actionLabel) {
  document.getElementById('icon').textContent = icon
  document.getElementById('title').textContent = title
  const msg = document.getElementById('msg')
  msg.textContent = message
  msg.className = tone || ''
  const action = document.getElementById('action')
  action.textContent = ''
  if (actionLabel) {
    const link = document.createElement('a')
    link.className = 'btn'
    link.href = APP_URL
    link.textContent = actionLabel
    action.appendChild(link)
  }
}

if (error) {
  setUI('❌', 'Connection Failed',
    params.get('error_description') || error, 'error', 'Back to Matty 7.0')
} else if (!code) {
  setUI('❓', 'No Code', 'Whoop did not return an authorization code.',
    'error', 'Back to Matty 7.0')
} else if (!expectedState || returnedState !== expectedState) {
  setUI('❌', 'Security Check Failed',
    'The Whoop login state did not match. Start the connection again from Settings.',
    'error', 'Back to Matty 7.0')
} else {
  localStorage.removeItem('whoop_state')
  exchangeToken(code)
}

async function exchangeToken(code) {
  try {
    const res = await fetch(API_BASE + '/api/whoop/callback', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ code, redirect_uri: REDIRECT_URI })
    })
    const data = await res.json().catch(() => ({}))

    if (res.ok && data.access_token) {
      localStorage.setItem('whoop_access_token', data.access_token)
      localStorage.setItem('whoop_refresh_token', data.refresh_token || '')
      localStorage.setItem('whoop_token_expires_at', String(Date.now() + ((data.expires_in || 3600) * 1000)))
      localStorage.setItem('whoop_connected', '1')
      setUI('✅', 'Whoop Connected!',
        'Connection complete. Opening your dashboard and starting a sync.',
        'success', 'Open Matty 7.0')
      setTimeout(() => { window.location.href = APP_URL + '#whoop_connected' }, 1200)
    } else {
      throw new Error(data.error || 'The token exchange was rejected')
    }
  } catch (error) {
    setUI('❌', 'Connection Failed',
      error.message + '. Check the Vercel Whoop environment variables, then try again.',
      'error', 'Back to Matty 7.0')
  }
}
</script>
</body>
</html>
